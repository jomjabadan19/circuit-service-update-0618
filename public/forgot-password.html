<!DOCTYPE html>
<html lang="en">
<head>	
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit-Service | Electronics Solution</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.PNG">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-image: url('circuit service for bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .tech-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-md border border-slate-800 p-8 rounded-3xl shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-2 tech-mono">RESET PASSWORD</h2>
        <p class="text-slate-400 text-sm mb-6">Enter your email address below to receive password recovery instructions.</p>

        <form id="resetForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-2 tracking-wide">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="emailaddress@domain.com" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-white placeholder-slate-500 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 outline-none transition-all shadow-sm">
            </div>

            <button type="submit" id="resetBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-extrabold py-3.5 rounded-xl transition-all shadow-lg shadow-amber-500/20 hover:shadow-amber-500/40">
                SEND RESET LINK
            </button>
            
            <a href="Index.html" class="block text-center text-xs font-semibold text-slate-400 hover:text-white transition-colors mt-4">
                Back to Main Page
            </a>
        </form>
    </div>

<script>
    // Initialize Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDvYhemJCzP4Q30_GAs5DzA-nbrdMqBthU",
        authDomain: "circuit-service.firebaseapp.com",
        projectId: "circuit-service",
        storageBucket: "circuit-service.firebasestorage.app",
        messagingSenderId: "931697304500",
        appId: "1:931697304500:web:9d6c2521d5953fa64308e1"
    };
    
    // Check if already initialized to prevent errors
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const resetForm = document.getElementById('resetForm');
    
    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // This will now work because the input has id="email"
        const email = document.getElementById('email').value;
        const btn = document.getElementById('resetBtn');
        
        btn.textContent = "SENDING...";
        btn.disabled = true;

        try {
            await firebase.auth().sendPasswordResetEmail(email);
            alert("Success! Check your email for the reset link.");
            window.location.href = "Index.html";
        } catch (error) {
            alert("Error: " + error.message);
            btn.textContent = "SEND RESET LINK";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
